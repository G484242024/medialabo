<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ロボット工学 満点トレーニング</title>
<style>
:root {
  --bg:#f7f4fb; --surface:#ffffff; --text:#201a2d; --muted:#6c6578;
  --accent:#7a2cc8; --accent2:#a542d1; --border:#e7def0;
  --ok:#147d55; --ok-bg:#eaf8f2; --ng:#b4233c; --ng-bg:#fff0f3;
  --shadow:0 18px 50px rgba(63,30,91,.10); --radius:22px;
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#fbf9fd 0%,var(--bg) 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP","Yu Gothic",Meiryo,sans-serif;min-height:100vh}
button,select{font:inherit}
button{cursor:pointer}
.app{width:min(920px,calc(100% - 28px));margin:0 auto;padding:26px 0 54px}
.header{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:22px}
.brand{display:flex;align-items:center;gap:13px}
.logo{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;color:white;font-size:25px;box-shadow:0 12px 28px rgba(122,44,200,.25)}
.brand h1{font-size:clamp(20px,3vw,30px);margin:0;letter-spacing:.02em}
.brand p{margin:3px 0 0;color:var(--muted);font-size:13px}
.best{text-align:right;color:var(--muted);font-size:13px}
.best strong{display:block;color:var(--accent);font-size:21px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.start{padding:clamp(24px,5vw,46px)}
.start h2{margin:0 0 10px;font-size:clamp(25px,4vw,40px)}
.start .lead{color:var(--muted);line-height:1.8;margin:0 0 28px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px}
.field{display:flex;flex-direction:column;gap:8px}
.field label{font-size:13px;font-weight:700;color:var(--muted)}
select{width:100%;padding:13px 14px;border:1px solid var(--border);border-radius:13px;background:#fff;color:var(--text);outline:none}
select:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(122,44,200,.10)}
.primary{border:0;border-radius:14px;padding:14px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:800;box-shadow:0 12px 26px rgba(122,44,200,.22)}
.secondary{border:1px solid var(--border);border-radius:14px;padding:13px 18px;background:#fff;color:var(--text);font-weight:700}
.primary:hover,.secondary:hover{transform:translateY(-1px)}
.balanced{margin-top:18px;padding:14px 16px;border:1px solid #eadcf4;background:#faf6fd;border-radius:14px;color:#5d5268;font-size:13px;line-height:1.7}
.quiz{padding:clamp(20px,4vw,34px)}
.topline{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px}
.category{color:var(--accent);font-weight:800;font-size:14px}
.score{font-weight:800}
.progress-wrap{height:8px;background:#eee8f2;border-radius:999px;overflow:hidden;margin-bottom:28px}
.progress{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width .25s ease}
.qno{color:var(--muted);font-weight:800;font-size:14px;margin-bottom:8px}
.question{font-size:clamp(20px,3vw,28px);line-height:1.55;margin:0 0 24px;white-space:pre-line}
.choices{display:grid;gap:12px}
.choice{width:100%;display:flex;align-items:flex-start;gap:13px;text-align:left;padding:16px 17px;border:1px solid var(--border);border-radius:15px;background:#fff;color:var(--text);transition:.16s ease;line-height:1.55}
.choice:hover:not(:disabled){border-color:#cfaee7;background:#fcf9ff;transform:translateY(-1px)}
.choice:disabled{cursor:default}
.letter{flex:0 0 31px;width:31px;height:31px;border-radius:10px;background:#f0e7f7;color:var(--accent);display:grid;place-items:center;font-weight:900}
.choice.correct{border-color:#71c5a7;background:var(--ok-bg)}
.choice.correct .letter{background:var(--ok);color:#fff}
.choice.wrong{border-color:#e79aaa;background:var(--ng-bg)}
.choice.wrong .letter{background:var(--ng);color:#fff}
.feedback{margin-top:18px;padding:16px 18px;border-radius:15px;display:none;line-height:1.7}
.feedback.show{display:block}
.feedback.ok{background:var(--ok-bg);border:1px solid #a9dec9}
.feedback.ng{background:var(--ng-bg);border:1px solid #efb9c4}
.feedback strong{display:block;margin-bottom:4px}
.actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
.result{padding:clamp(28px,6vw,54px);text-align:center}
.result .big{font-size:clamp(48px,9vw,82px);font-weight:900;color:var(--accent);line-height:1}
.result h2{font-size:clamp(25px,4vw,38px);margin:16px 0 8px}
.result p{color:var(--muted);line-height:1.8}
.result-actions{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:24px}
.hidden{display:none!important}
.footer{text-align:center;color:#8b8394;font-size:12px;margin-top:18px}
@media(max-width:680px){
  .app{width:min(100% - 18px,920px);padding-top:14px}
  .header{align-items:flex-start}
  .logo{width:42px;height:42px;border-radius:13px}
  .best{display:none}
  .grid{grid-template-columns:1fr}
  .start,.quiz,.result{border-radius:18px}
  .choice{padding:14px}
  .actions{justify-content:stretch}
  .actions button{width:100%}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important;scroll-behavior:auto!important}}
</style>
</head>
<body>
<main class="app">
  <header class="header">
    <div class="brand">
      <div class="logo" aria-hidden="true">🤖</div>
      <div><h1>ロボット工学 満点トレーニング</h1><p>全12回・72問／一問ずつ解答</p></div>
    </div>
    <div class="best">最高得点<strong id="bestScore">―</strong></div>
  </header>

  <section id="startScreen" class="panel start">
    <h2>今日の練習を始めよう</h2>
    <p class="lead">PDFの全72問を4択に統一しました。選択すると、その場で正誤と解説を確認できます。</p>
    <div class="grid">
      <div class="field"><label for="categorySelect">出題範囲</label><select id="categorySelect"><option value="all">全範囲</option></select></div>
      <div class="field"><label for="countSelect">問題数</label><select id="countSelect"><option value="10">10問</option><option value="20">20問</option><option value="36">36問</option><option value="72">全72問</option></select></div>
      <div class="field"><label for="orderSelect">出題順</label><select id="orderSelect"><option value="random">ランダム</option><option value="number">問題番号順</option></select></div>
    </div>
    <button id="startBtn" class="primary">スタート</button>
    <div class="balanced">正解位置は全72問で <strong>A・B・C・Dが各18問</strong> になるように調整済みです。Aだけに偏らない構成です。</div>
  </section>

  <section id="quizScreen" class="panel quiz hidden" aria-live="polite">
    <div class="topline"><div id="categoryLabel" class="category"></div><div id="scoreLabel" class="score">0 / 0</div></div>
    <div class="progress-wrap"><div id="progressBar" class="progress"></div></div>
    <div id="questionNumber" class="qno"></div>
    <h2 id="questionText" class="question"></h2>
    <div id="choices" class="choices"></div>
    <div id="feedback" class="feedback"></div>
    <div class="actions"><button id="nextBtn" class="primary hidden">次の問題へ</button></div>
  </section>

  <section id="resultScreen" class="panel result hidden">
    <div id="resultScore" class="big"></div>
    <h2 id="resultTitle"></h2>
    <p id="resultMessage"></p>
    <div class="result-actions">
      <button id="retryWrongBtn" class="primary">間違えた問題だけ復習</button>
      <button id="restartBtn" class="secondary">設定に戻る</button>
    </div>
  </section>
  <div class="footer">ロボット工学 期末テスト対策PDF（全12回・72問）をもとに作成</div>
</main>
<script>
const QUESTION_BANK=[{"id":1,"category":"第1回 歴史と種類","text":"ロボットの歴史を古い順に並べたものはどれか。","explanation":"講義では、18世紀の自動人形、1950年代のNC工作機、1960年代の産業用ロボット、1970年代の二足歩行ロボットの順です。","choices":["自動人形 → 産業用ロボット → NC工作機 → 二足歩行ロボット","自動人形 → NC工作機 → 産業用ロボット → 二足歩行ロボット","NC工作機 → 自動人形 → 二足歩行ロボット → 産業用ロボット","産業用ロボット → NC工作機 → 自動人形 → 二足歩行ロボット"],"answer":1},{"id":2,"category":"第1回 歴史と種類","text":"1950年代に登場したものとして正しいものはどれか。","explanation":"NC工作機は1950年代に登場しました。","choices":["汎用ロボット","医療ロボット","二足歩行ロボット","NC（Numerical Control）工作機"],"answer":3},{"id":3,"category":"第1回 歴史と種類","text":"Quinceが分類されるロボットはどれか。","explanation":"Quinceは災害現場などで活動するレスキュー支援ロボットです。","choices":["レスキュー支援ロボット","掃除ロボット","医療ロボット","接客ロボット"],"answer":0},{"id":4,"category":"第1回 歴史と種類","text":"Da Vinciが分類されるロボットはどれか。","explanation":"Da Vinciは手術支援に用いられる医療ロボットです。","choices":["玩具ロボット","軍事ロボット","医療ロボット","警備ロボット"],"answer":2},{"id":5,"category":"第1回 歴史と種類","text":"HALが分類されるロボットとして最も適切なものはどれか。","explanation":"HALは身体装着型で、人の動作を支援する福祉ロボットです。","choices":["特殊移動ロボット","ロボットキット","福祉ロボット","掃除ロボット"],"answer":2},{"id":6,"category":"第1回 歴史と種類","text":"SpotやAtlasが分類されるロボットはどれか。","explanation":"講義ではSpotやAtlasを汎用ロボットとして扱っています。","choices":["汎用ロボット","接客ロボット","医療ロボット","玩具ロボット"],"answer":0},{"id":7,"category":"第2回 定義・構成","text":"「ロボット」という言葉の発生に関係する人物と作品の組合せはどれか。","explanation":"Robotという語は、カレル・チャペックの戯曲『R.U.R.』に由来します。","choices":["ゲーテ―『われはロボット』","アイザック・アシモフ―『ファウスト』","メアリ・シェリー―『未来のイヴ』","カレル・チャペック―『R.U.R.』"],"answer":3},{"id":8,"category":"第2回 定義・構成","text":"ロボット工学三原則で最も優先されるものはどれか。","explanation":"第1条の「人間の安全」が最優先です。","choices":["人間の命令に必ず従うこと","人間に危害を加えず、危害を見逃さないこと","他のロボットと通信すること","ロボット自身を守ること"],"answer":1},{"id":9,"category":"第2回 定義・構成","text":"ロボットの機械的ハードウェアの働きの流れとして正しいものはどれか。","explanation":"動力源がエネルギーを供給し、アクチュエータが動きへ変換し、メカニズムが目的動作へ変換します。","choices":["メカニズム → 動力源 → アクチュエータ","動力源 → アクチュエータ → メカニズム","アクチュエータ → 動力源 → センサ","センサ → メカニズム → 動力源"],"answer":1},{"id":10,"category":"第2回 定義・構成","text":"センサとI/Oの役割として正しいものはどれか。","explanation":"センサは変位・速度・角度などを電気信号に変換し、I/Oを通してコンピュータへ取り込みます。","choices":["センサはプログラムを保存し、I/Oは油圧を発生する","センサは電池を充電し、I/Oは機械を冷却する","センサはモータを直接駆動し、I/Oは材料を加工する","センサは物理量を電圧に変換し、I/Oは値を読み込みディジタル化する"],"answer":3},{"id":11,"category":"第2回 定義・構成","text":"鉛蓄電池は1セル約2Vである。12Vを得るには何セルを直列に接続するか。","explanation":"12÷2=6なので、6セルを直列にします。","choices":["6セル","4セル","12セル","3セル"],"answer":0},{"id":12,"category":"第2回 定義・構成","text":"講義で挙げられたロボット材料の評価項目に含まれないものはどれか。","explanation":"材料は軽さ、強さ、耐蝕性、耐久性、加工性、経済性、安全性などで評価します。","choices":["軽さ","耐蝕性","好きな色であること","加工性"],"answer":2},{"id":13,"category":"第3回 モータの原理","text":"ブラシ付きDCモータの構成として正しいものはどれか。","explanation":"ブラシ付きDCモータは固定子、電機子、整流子、ブラシから構成されます。","choices":["シリンダ・ピストン・バルブ","カメラ・レンズ・受光面","固定子・電機子・整流子・ブラシ","電池・センサ・マイコン"],"answer":2},{"id":14,"category":"第3回 モータの原理","text":"磁界中の電線に加わる力を表す式として正しいものはどれか。","explanation":"磁束密度B、電流I、電線長Lが直交する場合、力はF=BILです。","choices":["F = BIL","F = BI/L","F = L/(BI)","F = B + I + L"],"answer":0},{"id":15,"category":"第3回 モータの原理","text":"ブラシレスモータの特徴として正しいものはどれか。","explanation":"ブラシレスモータは磁極の切替えを電子制御するため、ブラシの摩耗や接触ノイズがありません。","choices":["ブラシがあるため必ず摩耗する","一定角度ごとにしか回転できない","交流電源では動作しない","NSの切替えを電子制御し、ブラシ摩耗や接触ノイズがない"],"answer":3},{"id":16,"category":"第3回 モータの原理","text":"歯が100個あるステッピングモータの1ピッチと1/2ピッチの角度はどれか。","explanation":"1ピッチは360÷100=3.6°、1/2ピッチは3.6÷2=1.8°です。","choices":["1ピッチ36°、1/2ピッチ18°","1ピッチ3.6°、1/2ピッチ1.8°","1ピッチ1.8°、1/2ピッチ0.9°","1ピッチ7.2°、1/2ピッチ3.6°"],"answer":1},{"id":17,"category":"第3回 モータの原理","text":"ACモータの回転速度を変えるために使用する装置はどれか。","explanation":"インバータで周波数を変えてACモータの回転速度を制御します。","choices":["ロータリエンコーダ","インバータ","ストレーンゲージ","サーミスタ"],"answer":1},{"id":18,"category":"第3回 モータの原理","text":"支点から0.20mの位置に10Nの力を加えた。トルクTはいくつか。","explanation":"T=F×R=10×0.20=2 N・mです。","choices":["0.5 N・m","10 N・m","50 N・m","2 N・m"],"answer":3},{"id":19,"category":"第4回 モータ駆動","text":"マイコンの出力端子からDCモータを直接駆動しにくい主な理由はどれか。","explanation":"マイコンの出力は数mA程度で、モータが必要とする数百mA～数Aを供給できません。","choices":["出力電流が小さく、モータが必要とする大電流を供給できない","モータは必ず油圧で動作する","マイコンには電圧が存在しない","DCモータは光でしか動作しない"],"answer":0},{"id":20,"category":"第4回 モータ駆動","text":"FETをモータ駆動に使用する目的として正しいものはどれか。","explanation":"FETはマイコンの小さな信号でモータ側の大電流を切り替えます。","choices":["画像を保存する","バッテリーを直列接続する","小さな制御信号で大きな電流をON/OFFする","モータの温度だけを測る"],"answer":2},{"id":21,"category":"第4回 モータ駆動","text":"Hブリッジ回路の主な利点はどれか。","explanation":"Hブリッジはモータへ流す電流方向を切り替えることで、正転・逆転を行えます。","choices":["電源が不要になる","センサ値を画像に変換できる","1つの電源でモータの正転・逆転を切り替えられる","モータの温度を必ず一定にする"],"answer":2},{"id":22,"category":"第4回 モータ駆動","text":"モータ駆動用ICの説明として正しいものはどれか。","explanation":"モータ駆動用ICはHブリッジや制御回路をまとめたものです。","choices":["Hブリッジや制御回路を1つのICにまとめたもの","ロボットの材料","音を測定する専用センサ","画像を表示する液晶"],"answer":0},{"id":23,"category":"第4回 モータ駆動","text":"PWMでON時間とOFF時間の比が1:3である。デューティ比は何％か。","explanation":"1周期は1+3=4、ONは1なので、1÷4×100=25%です。","choices":["33%","75%","20%","25%"],"answer":3},{"id":24,"category":"第4回 モータ駆動","text":"ユニポーラ駆動とバイポーラ駆動の説明として正しいものはどれか。","explanation":"講義では、ユニポーラはモータ側が複雑・回路が簡単、バイポーラはモータ側が単純・回路が複雑と整理しています。","choices":["どちらもカメラの方式である","ユニポーラは回路が比較的簡単で、バイポーラは電流方向を切り替えるため回路が複雑","バイポーラは必ず電池を2つ必要とする","ユニポーラはモータを駆動できない"],"answer":1},{"id":25,"category":"第5回 内部センサ","text":"内部センサに分類されるものはどれか。","explanation":"内部センサはロボット自身の状態を測定します。","choices":["外部の音を測るマイク","関節の回転角度センサ","周囲の画像を撮るカメラ","障害物までの距離センサ"],"answer":1},{"id":26,"category":"第5回 内部センサ","text":"ポテンショメータの短所として正しいものはどれか。","explanation":"ポテンショメータは構造が簡単ですが、接触式で回転が重く、モータの負荷になる場合があります。","choices":["回転角度を測れない","電圧に変換できない","光を使用するため必ず高価である","回転が重く、モータの負荷になることがある"],"answer":3},{"id":27,"category":"第5回 内部センサ","text":"スリット数N=360、T=0.5秒間にn=90パルスを観測した。回転速度と回転角度はどれか。","explanation":"回転速度=90÷(360×0.5)=0.5回転/s、回転角度=90×360÷360=90°です。","choices":["0.5回転/s、90°","0.25回転/s、45°","1回転/s、180°","2回転/s、360°"],"answer":0},{"id":28,"category":"第5回 内部センサ","text":"グレイコードの特徴として正しいものはどれか。","explanation":"隣接コード間の変化を1ビットにすることで、切替え時の読み誤りを減らせます。","choices":["センサには使用できない","すべてのビットが同時に変化する","隣り合う値で変化するビットが基本的に1個","10進数だけで表す"],"answer":2},{"id":29,"category":"第5回 内部センサ","text":"温度が上がると抵抗が減少するサーミスタはどれか。","explanation":"NTCはNegative Temperature Coefficientで、温度上昇により抵抗が減少します。","choi ":"Arduino IDEのシリアルモニタで送信した文字や数値を確認できます。","choices":["PWM","Hブリッジ","A/D変換器","シリアルモニタ"],"answer":3},{"id":40,"category":"第7回 Arduino基本","text":"10ビットA/D変換で読み取れる値の範囲はどれか。","explanation":"2¹⁰=1024段階なので、0～1023です。","choices":["0～255","0～1023","0～10","0～100"],"answer":1},{"id":41,"category":"第7回 Arduino基本","text":"抵抗の色が「赤・赤・茶・金」のとき、抵抗値はどれか。","explanation":"赤=2、赤=2、茶=×10なので22×10=220Ωです。金は許容差5%です。","choices":["2.2kΩ","220Ω","22kΩ","22Ω"],"answer":1},{"id":42,"category":"第7回 Arduino基本","text":"講義のスイッチ入力回路で、スイッチを押したときdigitalRead(7)が返す値はどれか。","explanation":"プルアップ構成なので、OFFでHIGH、ONでLOWです。","choices":["HIGH","1023","255","LOW"],"answer":3},{"id":43,"category":"第8回 Arduinoモータ駆動","text":"Arduinoと9Vモータ電源を接続するときの注意として正しいものはどれか。","explanation":"制御信号の基準を合わせるためGNDは共通にしますが、異なる電圧の電源端子は直結しません。","choices":["GNDは共通にするが、5Vと9Vの電源端子を直接つながない","モータをUSB信号線に直接つなぐ","5V端子と9V端子を必ず直結する","GNDを絶対につながない"],"answer":0},{"id":44,"category":"第8回 Arduinoモータ駆動","text":"FETを使用した回路で、D11の役割として最も適切なものはどれか。","explanation":"D11からFETのゲートへ信号を送り、モータ電流を切り替えます。","choices":["温度を測定する","画像を取得する","FETをON/OFFする制御信号を出す","距離を測定する"],"answer":2},{"id":45,"category":"第8回 Arduinoモータ駆動","text":"モータと並列に接続するダイオードの主な目的はどれか。","explanation":"モータはコイルなので、電流遮断時の逆起電力をダイオードで逃がします。","choices":["モータの色を変える","A/D変換の分解能を上げる","モータ停止時などの逆起電力から回路を保護する","モータの軸を固定する"],"answer":2},{"id":46,"category":"第8回 Arduinoモータ駆動","text":"L293Dの説明として正しいものはどれか。","explanation":"L293Dは4回路のドライバを持ち、DCモータを2個制御できます。","choices":["ドライバ回路が4回路あり、DCモータを2個制御できる","電池を6セル内蔵する","温度センサが4個入っている","カメラを2台制御する"],"answer":0},{"id":47,"category":"第8回 Arduinoモータ駆動","text":"L293Dで入力2をHIGH、入力7をLOWにした場合の動作として正しいものはどれか。","explanation":"2つの入力を逆の論理にすると、モータへ一方向の電流が流れます。","choices":["画像を取得する","センサ値を0にする","必ず停止する","一方向に回転する"],"answer":3},{"id":48,"category":"第8回 Arduinoモータ駆動","text":"講義のプログラムで、スイッチ入力aがLOWのときD11へ出力する値はどれか。","explanation":"if(a==LOW)のときdigitalWrite(11,HIGH)としてモータを動作させます。","choices":["LOW","HIGH","1023","-1"],"answer":1},{"id":49,"category":"第9回 Arduino入力制御","text":"講義のディジタルスイッチ入力の状態と ":["消失点","原点","中点","特異点"],"answer":3},{"id":59,"category":"第10回 機構と移動","text":"上から見て、コマのように左右へ向きを変える回転はどれか。","explanation":"ヨーは鉛直軸まわりの回転です。","choices":["ヨー","ピッチ","スライド","ロール"],"answer":0},{"id":60,"category":"第10回 機構と移動","text":"前後左右へ移動できる全方向車輪はどれか。","explanation":"オムニホイールは周囲の小ローラにより横方向にも移動できます。","choices":["キャスター","一般的なラジアルタイヤ","オムニホイール","クローラ"],"answer":2},{"id":61,"category":"第11回 運動学基礎","text":"順運動学と逆運動学の説明として正しいものはどれか。","explanation":"関節角度→手先位置が順運動学、目標手先位置→関節角度が逆運動学です。","choices":["どちらもモータ温度だけを求める","どちらも電池電圧を求める","順運動学は関節角度から手先位置、逆運動学は手先位置から関節角度を求める","順運動学は画像処理、逆運動学は音声処理である"],"answer":2},{"id":62,"category":"第11回 運動学基礎","text":"長さL=10の1リンクがθ=30°を向く。手先座標(px,py)はどれか。","explanation":"px=10cos30°=8.66、py=10sin30°=5.00です。","choices":["(8.66, 5.00)","(10.00, 30.00)","(0.00, 10.00)","(5.00, 8.66)"],"answer":0},{"id":63,"category":"第11回 運動学基礎","text":"L1=L2=10、θ1=0°、θ2=90°の2リンクアームの手先座標はどれか。","explanation":"x=10cos0°+10cos90°=10、y=10sin0°+10sin90°=10です。","choices":["(20, 0)","(0, 20)","(10, 0)","(10, 10)"],"answer":3},{"id":64,"category":"第11回 運動学基礎","text":"点(10,0)を原点のまわりに30°回転した座標はどれか。","explanation":"x′=10cos30°=8.66、y′=10sin30°=5.00です。","choices":["(-8.66, 5.00)","(8.66, 5.00)","(5.00, 8.66)","(10.00, 0.00)"],"answer":1},{"id":65,"category":"第11回 運動学基礎","text":"2次元の同次変換行列を使用する目的として正しいものはどれか。","explanation":"座標を(px,py,1)と拡張し、回転と平行移動を同じ3×3行列で扱います。","choices":["PWMの周波数を測る","回転と平行移動を3×3行列でまとめて計算する","音の強さだけを測る","電池の直列数を計算する"],"answer":1},{"id":66,"category":"第11回 運動学基礎","text":"2リンクの逆運動学で注意すべき点として正しいものはどれか。","explanation":"肘を上げる解・下げる解など、同じ手先位置に複数解が存在する場合があります。","choices":["解は必ず1つしかない","三角関数は使用しない","リンク長は無関係である","同じ手先位置に複数の関節角度解が存在することがある"],"answer":3},{"id":67,"category":"第12回 ヤコビ行列","text":"3リンク平面アームの手先角度θとして正しい式はどれか。","explanation":"各関節の相対角度を足すと、手先リンクの絶対角度になります。","choices":["θ=θ1+θ2+θ3","θ=x+y","θ=θ1θ2θ3","θ=L1+L2+L3"],"answer":0},{"id":68,"category":"第12回 ヤコビ行列","text":"ヤコビ行列が表す関係として正しいものはどれか。","explanation":"ヤコビ行列はΔx,Δy,ΔθとΔθ1,Δθ2,Δθ3の局所的な関係を表します。","choices":["画像の色と明るさ","材料の価格と重量","関節角度の微小変化と手先位置・姿勢の微小変化","電池容量と温度"],"answer":2},{"id":69,"category":"第12回 ヤコビ行列","text":"J13=∂x/∂θ3として正しい式はどれか。","explanation":"xのうちθ3を含むのはL3cos(θ1+θ2+θ3)だけで、cosの微分は-sinです。","choices":["L3 cos(θ1+θ2+θ3)","-L1 sinθ1","-L3 sin(θ1+θ2+θ3)","1"],"answer":2},{"id":70,"category":"第12回 ヤコビ行列","text":"J23=∂y/∂θ3として正しい式はどれか。","explanation":"yのうちθ3を含むL3sin(θ1+θ2+θ3)を微分するとL3cos(...)です。","choices":["L3 cos(θ1+θ2+θ3)","0","-L3 sin(θ1+θ2+θ3)","L1 cosθ1"],"answer":0},{"id":71,"category":"第12回 ヤコビ行列","text":"L2=125mm、L3=160mm、θ1+θ2=45°、θ1+θ2+θ3=-45°、sin45°≈0.7のときJ12はどれか。","explanation":"J12=-125sin45°-160sin(-45°)=-87.5+112=24.5 mm/radです。","choices":["112 mm/rad","199.5 mm/rad","-24.5 mm/rad","24.5 mm/rad"],"answer":3},{"id":72,"category":"第12回 ヤコビ行列","text":"手先をy方向に100mm下げる（Δx=0, Δy=-100, Δθ=0）とき、講義資料の逆ヤコビ行列から得られる関節変化はどれか。","explanation":"資料のJ⁻¹に(0,-100,0)ᵀを掛けると(0.57,-1.14,0.57)ᵀです。","choices":["(-0.57, 1.14, -0.57) rad","(0.57, -1.14, 0.57) rad","(0.57, 0.57, -1.14) rad","(1.14, -0.57, 0.57) rad"],"answer":1}];
const letters=['A','B','C','D'];
const $=s=>document.querySelector(s);
const startScreen=$('#startScreen'), quizScreen=$('#quizScreen'), resultScreen=$('#resultScreen');
const categorySelect=$('#categorySelect'), countSelect=$('#countSelect'), orderSelect=$('#orderSelect');
const bestScore=$('#bestScore');
let currentSet=[], index=0, score=0, wrong=[], answered=false;

function escapeHTML(s){return String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

const categories=[...new Set(QUESTION_BANK.map(q=>q.category))];
categories.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;categorySelect.appendChild(o)});
function safeGet(key){try{return localStorage.getItem(key)}catch(e){return null}}
function safeSet(key,value){try{localStorage.setItem(key,value)}catch(e){}}
function loadBest(){const v=safeGet('robotQuizBest');bestScore.textContent=v?`${v}%`:'―'}
loadBest();

function begin(customSet=null){
  if(customSet) currentSet=[...customSet];
  else {
    let pool=categorySelect.value==='all'?QUESTION_BANK:QUESTION_BANK.filter(q=>q.category===categorySelect.value);
    if(orderSelect.value==='random') pool=shuffle(pool); else pool=[...pool].sort((a,b)=>a.id-b.id);
    const count=Math.min(Number(countSelect.value),pool.length);
    currentSet=pool.slice(0,count);
  }
  index=0;score=0;wrong=[];answered=false;
  startScreen.classList.add('hidden');resultScreen.classList.add('hidden');quizScreen.classList.remove('hidden');
  renderQuestion();
}

function renderQuestion(){
  answered=false;
  const q=currentSet[index];
  $('#categoryLabel').textContent=q.category;
  $('#scoreLabel').textContent=`${score} / ${index}`;
  $('#progressBar').style.width=`${(index/currentSet.length)*100}%`;
  $('#questionNumber').textContent=`Q${String(q.id).padStart(2,'0')}　${index+1} / ${currentSet.length}`;
  $('#questionText').textContent=q.text;
  const box=$('#choices');box.innerHTML='';
  q.choices.forEach((choice,i)=>{
    const b=document.createElement('button');b.className='choice';b.dataset.index=i;
    b.innerHTML=`<span class="letter">${letters[i]}</span><span>${escapeHTML(choice)}</span>`;
    b.addEventListener('click',()=>answer(i));box.appendChild(b);
  });
  const fb=$('#feedback');fb.className='feedback';fb.innerHTML='';
  $('#nextBtn').classList.add('hidden');
}

function answer(selected){
  if(answered)return;answered=true;
  const q=currentSet[index];
  document.querySelectorAll('.choice').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.answer)b.classList.add('correct');
    if(i===selected&&i!==q.answer)b.classList.add('wrong');
  });
  const correct=selected===q.answer;
  if(correct)score++;else wrong.push(q);
  const fb=$('#feedback');
  fb.className=`feedback show ${correct?'ok':'ng'}`;
  fb.innerHTML=`<strong>${correct?'正解！':'不正解'}　正解は ${letters[q.answer]}.</strong>${escapeHTML(q.explanation)}`;
  $('#scoreLabel').textContent=`${score} / ${index+1}`;
  $('#progressBar').style.width=`${((index+1)/currentSet.length)*100}%`;
  $('#nextBtn').textContent=index===currentSet.length-1?'結果を見る':'次の問題へ';
  $('#nextBtn').classList.remove('hidden');
}

function next(){if(!answered)return;if(index<currentSet.length-1){index++;renderQuestion()}else finish()}
function finish(){
  quizScreen.classList.add('hidden');resultScreen.classList.remove('hidden');
  const pct=Math.round(score/currentSet.length*100);
  $('#resultScore').textContent=`${score} / ${currentSet.length}`;
  $('#resultTitle').textContent=pct===100?'満点です！':pct>=80?'かなり仕上がっています':pct>=60?'あと少しで安定します':'復習してもう一度挑戦';
  $('#resultMessage').textContent=`正答率 ${pct}%。間違いは ${wrong.length} 問です。`;
  $('#retryWrongBtn').classList.toggle('hidden',wrong.length===0);
  const old=Number(safeGet('robotQuizBest')||0);if(pct>old)safeSet('robotQuizBest',pct);loadBest();
}

$('#startBtn').addEventListener('click',()=>begin());
$('#nextBtn').addEventListener('click',next);
$('#restartBtn').addEventListener('click',()=>{resultScreen.classList.add('hidden');startScreen.classList.remove('hidden')});
$('#retryWrongBtn').addEventListener('click',()=>begin(shuffle(wrong)));
document.addEventListener('keydown',e=>{
  if(!quizScreen.classList.contains('hidden')){
    if(!answered&&['1','2','3','4'].includes(e.key))answer(Number(e.key)-1);
    else if(answered&&(e.key==='Enter'||e.key===' '))next();
  }
});
</script>
</body>
</html>
