<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>シミュレーションとモデル 満点トレーニング</title>
<style>
:root{--bg:#f3f8fb;--surface:#fff;--text:#17242e;--muted:#62717c;--accent:#087f8c;--accent2:#14a57f;--border:#dbe8ec;--ok:#147d55;--ok-bg:#eaf8f2;--ng:#b4233c;--ng-bg:#fff0f3;--star:#e99517;--shadow:0 18px 48px rgba(21,71,83,.11);--radius:22px}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#fbfdfe 0%,var(--bg) 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP","Yu Gothic",Meiryo,sans-serif;min-height:100vh}button,select{font:inherit}button{cursor:pointer}.app{width:min(940px,calc(100% - 28px));margin:0 auto;padding:24px 0 54px}.header{display:flex;align-items:center;justify-content:space-between;gap:18px;margin-bottom:22px}.brand{display:flex;align-items:center;gap:13px}.logo{width:50px;height:50px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:grid;place-items:center;color:#fff;font-size:25px;box-shadow:0 12px 28px rgba(8,127,140,.24)}.brand h1{font-size:clamp(20px,3vw,30px);margin:0;letter-spacing:.02em}.brand p{margin:3px 0 0;color:var(--muted);font-size:13px}.best{text-align:right;color:var(--muted);font-size:13px}.best strong{display:block;color:var(--accent);font-size:21px}.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}.start{padding:clamp(24px,5vw,44px)}.start h2{margin:0 0 10px;font-size:clamp(25px,4vw,39px)}.lead{color:var(--muted);line-height:1.8;margin:0 0 26px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}.field{display:flex;flex-direction:column;gap:8px}.field label{font-size:13px;font-weight:800;color:var(--muted)}select{width:100%;padding:13px 14px;border:1px solid var(--border);border-radius:13px;background:#fff;color:var(--text);outline:none}select:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(8,127,140,.1)}.primary{border:0;border-radius:14px;padding:14px 20px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:900;box-shadow:0 12px 26px rgba(8,127,140,.21)}.secondary{border:1px solid var(--border);border-radius:14px;padding:13px 18px;background:#fff;color:var(--text);font-weight:800}.primary:hover,.secondary:hover{transform:translateY(-1px)}.start-actions{display:flex;flex-wrap:wrap;gap:10px}.balanced{margin-top:17px;padding:14px 16px;border:1px solid #cfe5e8;background:#f4fbfb;border-radius:14px;color:#4d656c;font-size:13px;line-height:1.7}.quiz{padding:clamp(20px,4vw,34px)}.topline{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px}.category{color:var(--accent);font-weight:900;font-size:14px}.score{font-weight:900}.progress-wrap{height:8px;background:#e8f0f2;border-radius:999px;overflow:hidden;margin-bottom:26px}.progress{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0;transition:width .25s ease}.qno{color:var(--muted);font-weight:900;font-size:14px;margin-bottom:8px}.question{font-size:clamp(20px,3vw,28px);line-height:1.55;margin:0 0 14px}.keyword-row{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:21px}.keyword{font-size:12px;font-weight:800;color:#086875;background:#e9f7f8;border:1px solid #c9e9eb;padding:5px 9px;border-radius:999px}.choices{display:grid;gap:12px}.choice{width:100%;display:flex;align-items:flex-start;gap:13px;text-align:left;padding:16px 17px;border:1px solid var(--border);border-radius:15px;background:#fff;color:var(--text);transition:.16s ease;line-height:1.55}.choice:hover:not(:disabled){border-color:#8acbd0;background:#f7fcfc;transform:translateY(-1px)}.choice:disabled{cursor:default}.letter{flex:0 0 31px;width:31px;height:31px;border-radius:10px;background:#e8f4f5;color:var(--accent);display:grid;place-items:center;font-weight:900}.choice.correct{border-color:#71c5a7;background:var(--ok-bg)}.choice.correct .letter{background:var(--ok);color:#fff}.choice.wrong{border-color:#e79aaa;background:var(--ng-bg)}.choice.wrong .letter{background:var(--ng);color:#fff}.feedback{margin-top:18px;padding:16px 18px;border-radius:15px;display:none;line-height:1.75}.feedback.show{display:block}.feedback.ok{background:var(--ok-bg);border:1px solid #a9dec9}.feedback.ng{background:var(--ng-bg);border:1px solid #efb9c4}.feedback strong{display:block;margin-bottom:4px}.actions{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}.result{padding:clamp(28px,6vw,54px);text-align:center}.result .big{font-size:clamp(48px,9vw,82px);font-weight:900;color:var(--accent);line-height:1}.result h2{font-size:clamp(25px,4vw,38px);margin:16px 0 8px}.result p{color:var(--muted);line-height:1.8}.result-actions{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:24px}.terms{padding:clamp(20px,4vw,34px)}.terms-head{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;margin-bottom:18px}.terms h2{margin:0 0 7px;font-size:clamp(24px,4vw,34px)}.terms-note{margin:0;color:var(--muted);line-height:1.7}.term-controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}.term-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.term-card{border:1px solid var(--border);border-radius:16px;padding:17px;background:#fff}.term-card h3{margin:0 0 12px;color:var(--accent);font-size:17px}.term-item{padding:10px 0;border-top:1px dashed #deeaed}.term-item:first-of-type{border-top:0;padding-top:0}.term-title{display:flex;align-items:center;justify-content:space-between;gap:10px;font-weight:900}.stars{color:var(--star);white-space:nowrap;letter-spacing:1px}.term-def{color:var(--muted);font-size:13px;line-height:1.65;margin-top:4px}.hidden{display:none!important}.footer{text-align:center;color:#829099;font-size:12px;margin-top:18px}@media(max-width:680px){.app{width:min(100% - 18px,940px);padding-top:14px}.header{align-items:flex-start}.logo{width:42px;height:42px;border-radius:13px}.best{display:none}.grid,.term-grid{grid-template-columns:1fr}.start,.quiz,.result,.terms{border-radius:18px}.choice{padding:14px}.actions{justify-content:stretch}.actions button{width:100%}.terms-head{display:block}.terms-head button{margin-top:12px;width:100%}}@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style></head><body><main class="app">
<header class="header"><div class="brand"><div class="logo" aria-hidden="true">▦</div><div><h1>シミュレーションとモデル 満点トレーニング</h1><p>全12回・72問／重要語句の重要度つき</p></div></div><div class="best">最高得点<strong id="bestScore">―</strong></div></header>
<section id="startScreen" class="panel start"><h2>期末試験の全範囲を練習</h2><p class="lead">講義資料12回分から、定義・計算・モデルの特徴を4択問題にしました。選択後すぐに正誤と解説を確認できます。</p><div class="grid"><div class="field"><label for="categorySelect">出題範囲</label><select id="categorySelect"><option value="all">全範囲</option></select></div><div class="field"><label for="countSelect">問題数</label><select id="countSelect"><option value="10">10問</option><option value="20">20問</option><option value="36">36問</option><option value="72">全72問</option></select></div><div class="field"><label for="orderSelect">出題順</label><select id="orderSelect"><option value="random">ランダム</option><option value="number">問題番号順</option></select></div></div><div class="start-actions"><button id="startBtn" class="primary">問題を始める</button><button id="termsBtn" class="secondary">重要語句を見る</button></div><div class="balanced">正解位置は全72問で <strong>A・B・C・Dが各18問</strong>。重要語句は <strong>★★★＝最重要、★★＝重要、★＝確認</strong> で表示します。</div></section>
<section id="quizScreen" class="panel quiz hidden" aria-live="polite"><div class="topline"><div id="categoryLabel" class="category"></div><div id="scoreLabel" class="score">0 / 0</div></div><div class="progress-wrap"><div id="progressBar" class="progress"></div></div><div id="questionNumber" class="qno"></div><h2 id="questionText" class="question"></h2><div id="keywordRow" class="keyword-row"></div><div id="choices" class="choices"></div><div id="feedback" class="feedback"></div><div class="actions"><button id="nextBtn" class="primary hidden">次の問題へ</button></div></section>
<section id="resultScreen" class="panel result hidden"><div id="resultScore" class="big"></div><h2 id="resultTitle"></h2><p id="resultMessage"></p><div class="result-actions"><button id="retryWrongBtn" class="primary">間違えた問題だけ復習</button><button id="restartBtn" class="secondary">設定に戻る</button><button id="resultTermsBtn" class="secondary">重要語句を確認</button></div></section>
<section id="termsScreen" class="panel terms hidden"><div class="terms-head"><div><h2>重要語句・重要度</h2><p class="terms-note">★★★を先に覚え、次に★★を確認すると効率よく復習できます。</p></div><button id="termsBackBtn" class="secondary">戻る</button></div><div class="term-controls"><div class="field"><label for="termLecture">講義回</label><select id="termLecture"><option value="all">全12回</option></select></div></div><div id="termGrid" class="term-grid"></div></section>
<div class="footer">「シミュレーションとモデル」第1回〜第12回の講義資料をもとに作成</div></main>
<script>
const QUESTION_BANK=[{"id":1,"category":"第1回 基礎・データ構造","text":"シミュレーションの説明として最も適切なものはどれか。","choices":["現実には時間・費用・危険などの理由で難しい現象を、できるだけ現実に近い条件で検証する実験的方法","現実の現象を必ず完全に再現する方法","プログラムを短く書くためだけの方法","データを暗号化する方法"],"answer":0,"explanation":"シミュレーションは、現実に直接試すことが難しい問題を、モデルを用いて安全・低コストに検証する方法です。","keywords":["シミュレーション","モデル"]},{"id":2,"category":"第1回 基礎・データ構造","text":"妥当なシミュレーション結果を得るために必要な組合せはどれか。","choices":["大量の画像と高速な通信","適切なモデルと適切な手順","難しい数式と長いプログラム","高価なコンピュータだけ"],"answer":1,"explanation":"結果の妥当性は、対象を表すモデルと、実行・評価まで含む手順の両方に左右されます。","keywords":["適切なモデル","適切な手順"]},{"id":3,"category":"第1回 基礎・データ構造","text":"データ構造とは何か。","choices":["コンピュータの外観や形状","プログラムの実行速度だけを測る値","問題をモデル化するために用いるデータの表現方法、または表現そのもの","入力装置の操作手順"],"answer":2,"explanation":"問題の本質を失わず、必要な部分を表現する方法がデータ構造です。","keywords":["データ構造","モデル化"]},{"id":4,"category":"第1回 基礎・データ構造","text":"有向グラフで、対象を表す点と関係を表す矢印の名称はどれか。","choices":["点は辺、矢印は頂点","点は配列、矢印はリスト","点は手順、矢印は変数","点は頂点、矢印は辺"],"answer":3,"explanation":"有向グラフでは対象を頂点（vertex）、向きのある関係を辺（edge）で表します。","keywords":["有向グラフ","頂点","辺"]},{"id":5,"category":"第1回 基礎・データ構造","text":"論理構造と物理構造の違いとして正しいものはどれか。","choices":["論理構造は概念的な表現、物理構造は計算機内で実現する具体的な表現","論理構造はハードウェア、物理構造は文章","両者に違いはない","論理構造は必ず配列、物理構造は必ずグラフ"],"answer":0,"explanation":"グラフなどの抽象的な表現が論理構造、配列やポインタによる実装が物理構造です。","keywords":["論理構造","物理構造"]},{"id":6,"category":"第1回 基礎・データ構造","text":"アルゴリズムの基本的な条件として正しいものはどれか。","choices":["実行する人によって毎回答えが変わる","明確な手順が定まり、指示どおり実行すれば同じ結果になり、計算が終了する","必ず無限に処理を続ける","特定のプログラミング言語でしか書けない"],"answer":1,"explanation":"アルゴリズムは明確で再現可能な有限の処理手順です。PADの基本構造は連接・選択・反復です。","keywords":["アルゴリズム","PAD"]},{"id":7,"category":"第2回 手順・モデル化","text":"トップダウン型のシミュレーションに当てはまるものはどれか。","choices":["個々のエージェントの局所的相互作用だけから現象を創発させる","モデルを作らず直感だけで結果を決める","対象を微分方程式や待ち行列などの数理モデルで表現する","実験結果を一切評価しない"],"answer":2,"explanation":"トップダウン型では、全体を数理モデルで記述し、主に数値解析を用います。","keywords":["トップダウン型","数理モデル"]},{"id":8,"category":"第2回 手順・モデル化","text":"ボトムアップ型の特徴として正しいものはどれか。","choices":["全体を一つの方程式だけで表す","時間変化を必ず無視する","確率を一切使わない","個々の要素の局所的相互作用から全体の現象を創発させる"],"answer":3,"explanation":"エージェントベースモデリングは、単純な個体の相互作用から全体現象を生じさせます。","keywords":["ボトムアップ型","創発"]},{"id":9,"category":"第2回 手順・モデル化","text":"シミュレーションの一般的な手順として正しい順番はどれか。","choices":["問題の明確化→モデル化→シミュレーション→評価・検証→チューニング→意思決定","モデル化→意思決定→問題の明確化→評価","シミュレーション→モデル化→問題の明確化→終了","意思決定→評価→モデル化→シミュレーション"],"answer":0,"explanation":"目的を先に明確化し、結果を評価して必要ならモデルや方法を修正した後、意思決定につなげます。","keywords":["シミュレーションの手順","評価・検証"]},{"id":10,"category":"第2回 手順・モデル化","text":"ダムのモデルで、変化後の貯水量を表す基本式はどれか。","choices":["貯水量＝流入量＋流出量","貯水量＝現在の貯水量＋（流入量－流出量）×時間間隔","貯水量＝現在の貯水量÷時間間隔","貯水量＝流出量－流入量"],"answer":1,"explanation":"蓄積量の変化は、入ってくる量から出ていく量を引いた差で決まります。","keywords":["蓄積量","流入量","流出量"]},{"id":11,"category":"第2回 手順・モデル化","text":"講義のダムモデルで、最大放流へ切り替える基準はどれか。","choices":["貯水量が280万m³未満","貯水量が350万m³を超えた後だけ","貯水量が310万m³以上","流入量が0.5万m³のときだけ"],"answer":2,"explanation":"310万m³未満では日常放流、310万m³以上では最大放流と設定しました。","keywords":["日常放流量","最大放流量"]},{"id":12,"category":"第2回 手順・モデル化","text":"評価・検証の後にチューニングを行う目的はどれか。","choices":["結果を見ずに同じ条件を繰り返すため","現実の問題を別の問題に変えるため","必ずモデルを複雑にするため","モデルやシミュレーション方法に問題があれば修正・改良するため"],"answer":3,"explanation":"評価で妥当性を確認し、問題があればモデルやパラメータ、方法を改善します。","keywords":["評価・検証","チューニング"]},{"id":13,"category":"第3回 モデルの分類","text":"静的モデルの説明として正しいものはどれか。","choices":["時間変化を考慮せず、定常状態の均衡などを考察するモデル","時間とともに連続的に変化するモデル","離散時刻ごとの変化だけを表すモデル","必ず乱数を使うモデル"],"answer":0,"explanation":"損益分岐点分析や時間を考えない市場均衡分析などが静的モデルの例です。","keywords":["静的モデル","定常状態"]},{"id":14,"category":"第3回 モデルの分類","text":"離散変化モデルの例として最も適切なものはどれか。","choices":["空気中を飛ぶ物体の連続運動","在庫の到着・引き取りや待ち行列","流体の連続的な速度変化","電圧の微分方程式だけ"],"answer":1,"explanation":"在庫や客の到着など、事象が離散的に発生する対象を表します。","keywords":["離散変化モデル","待ち行列"]},{"id":15,"category":"第3回 モデルの分類","text":"決定的モデルと確率的モデルの違いはどれか。","choices":["決定的モデルだけが時間変化を扱う","確率的モデルは必ず正しい未来を予測する","決定的モデルは不確定要素を含まず、確率的モデルは確率的要素を少なくとも一つ含む","決定的モデルはモデル化できない"],"answer":2,"explanation":"法則と初期条件で変化が定まるのが決定的モデル、発生や変化に確率が関わるのが確率的モデルです。","keywords":["決定的モデル","確率的モデル"]},{"id":16,"category":"第3回 モデルの分類","text":"カオスモデルの特徴として正しいものはどれか。","choices":["完全にランダムで法則が存在しない","時間変化を考慮しない","必ず同じ周期を繰り返す","決定的であっても初期値に敏感で、非周期的かつ将来予測が難しい"],"answer":3,"explanation":"カオスは確率モデルとは異なり決定的ですが、初期値の小さな差が将来を大きく変えます。","keywords":["カオス","初期値鋭敏性"]},{"id":17,"category":"第3回 モデルの分類","text":"複雑系モデルの説明として正しいものはどれか。","choices":["複数のエージェントが単純な規則で局所的に相互作用し、全体の振る舞いが生じる","一つの中央ルールが全個体の動きを細かく決める","対象を必ず静的に扱う","確率分布だけで全てを表す"],"answer":0,"explanation":"交通渋滞や雲の形成など、個体の相互作用からマクロな現象が現れます。","keywords":["複雑系","エージェント"]},{"id":18,"category":"第3回 モデルの分類","text":"空気抵抗と横風を無視した放物運動で、投射角が90°のとき正しいものはどれか。","choices":["重力加速度が0になる","水平方向の速度成分は0となり、鉛直方向の運動になる","物体は必ず静止する","水平方向にだけ等加速度運動する"],"answer":1,"explanation":"角度90°では初速度のx成分が0なので、鉛直方向だけの運動として扱えます。","keywords":["放物運動","ニュートンの運動法則"]},{"id":19,"category":"第4回 確率・統計","text":"コンピュータで用いる乱数が一般に『疑似乱数』と呼ばれる理由はどれか。","choices":["乱数が必ず正規分布になるため","乱数を一度しか使えないため","コンピュータの処理は決定的な手続きであり、規則に従って数列を生成するため","人間が手作業で入力するため"],"answer":2,"explanation":"コンピュータは決定的な計算を行うため、完全な無規則ではなく疑似的な乱数列を作ります。","keywords":["乱数","疑似乱数"]},{"id":20,"category":"第4回 確率・統計","text":"ラプラスの定義による確率の求め方はどれか。","choices":["試行回数÷成功回数","期待値÷分散","最大値－最小値","特定の事象の数÷すべての同様に確からしい事象の数"],"answer":3,"explanation":"すべての結果が同様に確からしい場合、該当する場合の数を全場合の数で割ります。","keywords":["ラプラスの定義","同様に確からしい"]},{"id":21,"category":"第4回 確率・統計","text":"大数の法則が述べる内容として正しいものはどれか。","choices":["試行回数を増やすと経験的な割合や標本平均が理論確率・期待値に近づく","過去に出なかった結果は次に必ず出る","少ない試行ほど正確になる","すべての確率が同じになる"],"answer":0,"explanation":"過去の偏りを次の試行が補償するという意味ではなく、長期的な平均が収束するという法則です。","keywords":["大数の法則","経験的確率"]},{"id":22,"category":"第4回 確率・統計","text":"中心極限定理の重要な点はどれか。","choices":["元のデータが必ず一様分布になる","母集団の分布にかかわらず、条件を満たし標本数が十分大きいと標本平均の分布が正規分布に近づく","標本数を増やすと分散が無限大になる","一回の観測だけで母集団が完全に分かる"],"answer":1,"explanation":"シミュレーション結果を繰り返して得た平均を統計的に評価する根拠になります。","keywords":["中心極限定理","正規分布"]},{"id":23,"category":"第4回 確率・統計","text":"家屋の年間焼失率が0.1%、保険金が1000万円のとき、単純な期待値としての純保険料はいくらか。","choices":["10万円","100万円","1万円","1000円"],"answer":2,"explanation":"1000万円×0.001＝1万円です。期待値は確率で重みづけした平均です。","keywords":["期待値","純保険料"]},{"id":24,"category":"第4回 確率・統計" function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function show(screen){[els.start,els.quiz,els.result,els.terms].forEach(x=>x.classList.add('hidden'));screen.classList.remove('hidden');window.scrollTo({top:0,behavior:'smooth'})}

function renderQuestion(){const q=session[index];els.catLabel.textContent=q.category;els.score.textContent=`${correct} / ${index}`;els.progress.style.width=`${(index/session.length)*100}%`;els.qno.textContent=`問題 ${index+1} / ${session.length}（全体Q${q.id}）`;els.qtext.textContent=q.text;els.keywords.innerHTML=q.keywords.map(k=>`<span class="keyword">重要語句：${k}</span>`).join('');els.choices.innerHTML='';els.feedback.className='feedback';els.feedback.innerHTML='';els.next.classList.add('hidden');q.choices.forEach((c,i)=>{const b=document.createElement('button');b.className='choice';b.innerHTML=`<span class="letter">${letters[i]}</span><span>${c}</span>`;b.onclick=()=>answer(i,b);els.choices.appendChild(b)})}
function answer(choice,btn){const q=session[index];[...els.choices.children].forEach((b,i)=>{b.disabled=true;if(i===q.answer)b.classList.add('correct')});if(choice===q.answer){correct++;els.feedback.className='feedback show ok';els.feedback.innerHTML=`<strong>正解：${letters[q.answer]}</strong>${q.explanation}`}else{btn.classList.add('wrong');wrong.push(q);els.feedback.className='feedback show ng';els.feedback.innerHTML=`<strong>不正解　正解は ${letters[q.answer]}</strong>${q.explanation}`}els.score.textContent=`${correct} / ${index+1}`;els.progress.style.width=`${((index+1)/session.length)*100}%`;els.next.textContent=index===session.length-1?'結果を見る':'次の問題へ';els.next.classList.remove('hidden')}
function finish(){show(els.result);const pct=Math.round(correct/session.length*100);els.resultScore.textContent=`${correct} / ${session.length}`;els.resultTitle.textContent=pct>=90?'かなり仕上がっています！':pct>=70?'合格点が見えてきました':pct>=50?'重要語句をもう一度確認':'まず★★★から覚えよう';els.resultMessage.textContent=`正答率は${pct}%です。${wrong.length?`間違えた${wrong.length}問だけを続けて復習できます。`:'全問正解です。'}`;els.retryWrong.classList.toggle('hidden',wrong.length===0);const prev=Number(localStorage.getItem('simModelBestPct')||0);if(pct>prev){localStorage.setItem('simModelBestPct',pct);localStorage.setItem('simModelBest',`${correct}/${session.length}（${pct}%）`);updateBest()}}
els.startBtn.onclick=()=>startQuiz();els.next.onclick=()=>{index++;index>=session.length?finish():renderQuestion()};els.retryWrong.onclick=()=>startQuiz([...wrong]);els.restart.onclick=()=>show(els.start);
function openTerms(from){returnScreen=from;renderTerms();show(els.terms)}els.termsBtn.onclick=()=>openTerms('start');els.resultTerms.onclick=()=>openTerms('result');els.termsBack.onclick=()=>show(returnScreen==='result'?els.result:els.start);els.termLecture.onchange=renderTerms;
function renderTerms(){const selected=els.termLecture.value;const groups=selected==='all'?Object.entries(IMPORTANT_TERMS):[[selected,IMPORTANT_TERMS[selected]]];els.termGrid.innerHTML=groups.map(([lecture,items])=>`<article class="term-card"><h3>${lecture}</h3>${items.map(([term,def,level])=>`<div class="term-item"><div class="term-title"><span>${term}</span><span class="stars">${'★'.repeat(level)}${'☆'.repeat(3-level)}</span></div><div class="term-def">${def}</div></div>`).join('')}</article>`).join('')}
</script></body></html>
